<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make images responsive</title>
<style>
img {
    max-width: 100%;
    height: auto;
    display: block;
}

/* Optional container */
.image-container {
    max-width: 800px;
    margin: 0 auto;
}
</style>
</head>
<body>

<div class="image-container">
    <img src="mjy12.jpg" alt="Responsive Image">

</html>
