<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Card Layout</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
}

.card-content {
    padding: 16px;
}

.card h3 {
    margin-bottom: 10px;
    font-size: 1.4rem;
}

.card p {
    color: #555;
    line-height: 1.5;
    margin-bottom: 15px;
}

.card a {
    display: inline-block;
    text-decoration: none;
    background: #007bff;
    color: #fff;
    padding: 10px 16px;
    border-radius: 5px;
}

.card a:hover {
    opacity: 0.9;
}
</style>
</head>
<body>

<div class="cards">

    <div class="card">
        <img src="https://picsum.photos/400/250?random=1" alt="Card Image">
        <div class="card-content">
            <h3>Card One</h3>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            <a href="#">Read More</a>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/250?random=2" alt="Card Image">
        <div class="card-content">
            <h3>Card Two</h3>
            <p>Responsive cards automatically adjust to screen size.</p>
            <a href="#">Read More</a>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/250?random=3" alt="Card Image">
        <div class="card-content">
            <h3>Card Three</h3>
            <p>CSS Grid creates a flexible and responsive layout.</p>
            <a href="#">Read More</a>
        </div>
    </div>

</div>

</body>
</html>
