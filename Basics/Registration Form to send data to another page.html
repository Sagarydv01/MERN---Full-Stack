<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form, Data send to another page</title>
</head>
<body>
    <h2>Registration Form</h2>
    <form id="registerForm">
        <input type="text" id="name" placeholder="Enter your name"><br><br>
        <input type="email" id="email" placeholder="Enter email"><br><br>
        <input type="tel" id="phone" placeholder="Enter Mobile Number"><br><br>
        <button type="submit" id="registerBtn">Submit</button>
    </form>

    <script>
        document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;

            localStorage.setItem("userName", name);
            localStorage.setItem("userEmail", email);
            localStorage.setItem("userPhone", phone);

            window.location.href = "displayFormData.html";
        });
    </script>

</body>
</html>
