<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Photo Gallery</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f4f4f4;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    display: block;
    border-radius: 8px;
    transition: transform 0.3s ease;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Tablet */
@media (max-width: 992px) {
    .gallery {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Mobile */
@media (max-width: 600px) {
    .gallery {
        grid-template-columns: 1fr;
    }

    .gallery img {
        height: 220px;
    }
}
</style>
</head>
<body>

<h2>Responsive Photo Gallery</h2>

<div class="gallery">
    <img src="https://picsum.photos/id/1015/600/400" alt="Photo 1">
    <img src="https://picsum.photos/id/1016/600/400" alt="Photo 2">
    <img src="https://picsum.photos/id/1018/600/400" alt="Photo 3">
    <img src="https://picsum.photos/id/1020/600/400" alt="Photo 4">
    <img src="https://picsum.photos/id/1024/600/400" alt="Photo 5">
    <img src="https://picsum.photos/id/1025/600/400" alt="Photo 6">
    <img src="https://picsum.photos/id/1035/600/400" alt="Photo 7">
    <img src="https://picsum.photos/id/1039/600/400" alt="Photo 8">
</div>

</body>
</html>
