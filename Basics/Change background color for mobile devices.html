<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background changes on mobile devices</title>
    <style>
        body {
            background-color: white;
        }

        /* Mobile devices */
        @media (max-width: 768px) {
            body {
                background-color: lightblue;
            }
        }
    </style>
</head>

<body>
    <h1>Background changes on mobile devices</h1>
</body>

</html>
