<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Examination Registration Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: white;
            font-size: 18px;
        }

        h1{
            text-align: center;
        }

        @media screen and (max-width: 600px){
            body{
                background-color: lightblue;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <h1>Online Examination Registration Form</h1>

    <form>

        <label for="student-name">Student Name:</label><br>
        <input type="text" id="student-name" name="student-name" required><br><br>

        <label for="roll-number">Roll Number:</label><br>
        <input type="text" id="roll-number" name="roll-number" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="course">Course:</label><br>
        <select id="course" name="course" required>
            <option>MCA</option>
            <option>BCA</option>
            <option>B.Tech</option>
            <option>BBA</option>
        </select><br><br>

        <label for="semester">Semester:</label><br>
        <select id="semester" name="semester" required>
            <option>1st</option>
            <option>2nd</option>
            <option>3rd</option>
            <option>4th</option>
        </select><br><br>

        <label for="subject">Subject:</label><br>
        <input type="text" id="subject" name="subject" required><br><br>

        <label for="exam-date">Exam Date:</label><br>
        <input type="date" id="exam-date" name="exam-date" required><br><br>

        <input type="submit" value="Register">

    </form>

</body>
</html>
