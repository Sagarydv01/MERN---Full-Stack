<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Navigation Menu</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

nav {
    background: #333;
}

.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
}

.logo {
    color: white;
    font-size: 1.5rem;
    font-weight: bold;
}

.menu {
    list-style: none;
    display: flex;
    gap: 1.5rem;
}

.menu a {
    color: white;
    text-decoration: none;
}

.menu-toggle {
    display: none;
    font-size: 1.8rem;
    color: white;
    cursor: pointer;
    background: none;
    border: none;
}

/* Mobile */
@media (max-width: 768px) {
    .menu-toggle {
        display: block;
    }

    .menu {
        display: none;
        flex-direction: column;
        width: 100%;
        background: #444;
    }

    .menu.active {
        display: flex;
    }

    .menu li {
        text-align: center;
        padding: 1rem;
        border-top: 1px solid #555;
    }

    .nav-container {
        flex-wrap: wrap;
    }
}
</style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="logo">Logo</div>

        <button class="menu-toggle" id="menuToggle">
            ☰
        </button>

        <ul class="menu" id="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>
</nav>

<script>
const menuToggle = document.getElementById('menuToggle');
const menu = document.getElementById('menu');

menuToggle.addEventListener('click', () => {
    menu.classList.toggle('active');
});
</script>

</body>
</html>
